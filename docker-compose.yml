version: "3.9"

services:
  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: parking-backend-api
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./parking.db}
      AI_SHARED_SECRET: ${AI_SHARED_SECRET:-demo-secret}
      STATIC_DIR: /app/static
      SLOT_CONFIG_PATH: ${SLOT_CONFIG_PATH:-/app/config/slot-config.json}
    volumes:
      - ./apps/backend-api:/app
      - ./infra/slot-config.json:/app/config/slot-config.json:ro
    restart: unless-stopped

  ai-detection-service:
    build:
      context: .
      dockerfile: apps/ai-detection-service/Dockerfile
    container_name: parking-ai-detection-service
    depends_on:
      - backend-api
    environment:
      PORT: 9000
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend-api:8000/api}
      AI_SHARED_SECRET: ${AI_SHARED_SECRET:-demo-secret}
      VIDEO_SOURCE: ${VIDEO_SOURCE:-./datasets/sample.mp4}
      SLOT_CONFIG_PATH: ${SLOT_CONFIG_PATH:-/app/config/slot-config.json}
      MOCK_MODE: ${MOCK_MODE:-true}
      MOCK_INTERVAL_SECONDS: ${MOCK_INTERVAL_SECONDS:-2}
    ports:
      - "${AI_PORT:-9000}:9000"
    volumes:
      - ./apps/ai-detection-service:/app
      - ./datasets:/app/datasets
      - ./infra/slot-config.json:/app/config/slot-config.json:ro
    restart: unless-stopped

  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    container_name: parking-web-dashboard
    depends_on:
      - backend-api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./apps/web-dashboard:/app
    restart: unless-stopped
